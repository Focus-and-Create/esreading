<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페인어 독해 학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}

/* ── PASSAGE BAR ── */
.passage-bar{background:#1a202c;border-bottom:1px solid #2d3748;padding:8px 16px;display:flex;align-items:center;gap:10px}
.passage-bar-label{font-size:11px;color:#718096;font-weight:600;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
#passage-sel{background:#2d3748;color:#e2e8f0;border:1px solid #4a5568;border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer;outline:none;max-width:420px;width:100%}
#passage-sel:hover{border-color:#63b3ed}

/* ── NAV ── */
.tab-nav{display:flex;background:#1a202c;padding:0 16px;overflow-x:auto;white-space:nowrap}
.tab-btn{padding:14px 18px;color:#718096;cursor:pointer;border:none;background:none;font-size:14px;border-bottom:3px solid transparent;transition:all .2s;flex-shrink:0}
.tab-btn:hover{color:#e2e8f0}
.tab-btn.active{color:#fff;border-bottom-color:#63b3ed}

/* ── TABS ── */
.tab-pane{display:none;padding:28px 20px;max-width:920px;margin:0 auto}
.tab-pane.active{display:block}

/* ── READING ── */
.passage{background:#fff;padding:32px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);line-height:2;font-size:16px}
.passage h2{margin-bottom:24px;font-size:22px;color:#1a202c;border-bottom:2px solid #e2e8f0;padding-bottom:12px}
.passage p{margin-bottom:18px}

.vw{border-bottom:2px dashed #e53e3e;cursor:pointer;position:relative;display:inline}
.vw:hover,.vw.open{background:#fff5f5;border-radius:2px}

.tip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#2d3748;color:#fff;padding:11px 14px;border-radius:9px;font-size:13px;width:230px;z-index:999;line-height:1.6;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#2d3748}
.vw:hover .tip,.vw.open .tip{display:block}
.tip-word{font-weight:700;font-size:14px;color:#90cdf4}
.tip-mean{color:#e2e8f0;margin:3px 0 6px}
.tip-ex{font-size:12px;color:#a0aec0;font-style:italic}

/* ── VOCAB ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.fbtn{padding:7px 16px;border-radius:20px;border:2px solid;cursor:pointer;background:#fff;font-size:13px;font-weight:600;transition:all .2s}
.fbtn.all{border-color:#718096;color:#718096}.fbtn.all.on{background:#718096;color:#fff}
.fbtn.noun{border-color:#3182ce;color:#3182ce}.fbtn.noun.on{background:#3182ce;color:#fff}
.fbtn.adj{border-color:#38a169;color:#38a169}.fbtn.adj.on{background:#38a169;color:#fff}
.fbtn.verb{border-color:#d53f8c;color:#d53f8c}.fbtn.verb.on{background:#d53f8c;color:#fff}
.fbtn.expr{border-color:#805ad5;color:#805ad5}.fbtn.expr.on{background:#805ad5;color:#fff}

.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px}
.vc{background:#fff;border-radius:11px;box-shadow:0 2px 7px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s,box-shadow .15s;overflow:hidden}
.vc:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.12)}
.vc-head{padding:14px 15px;display:flex;justify-content:space-between;align-items:center}
.vc-w{font-size:16px;font-weight:700}
.vc-m{font-size:13px;color:#718096;margin-top:2px}
.vc-badge{font-size:11px;padding:3px 9px;border-radius:12px;color:#fff;font-weight:700;white-space:nowrap}
.noun .vc-w{color:#2b6cb0}.noun .vc-badge{background:#3182ce}
.adj .vc-w{color:#276749}.adj .vc-badge{background:#38a169}
.verb .vc-w{color:#97266d}.verb .vc-badge{background:#d53f8c}
.expr .vc-w{color:#553c9a}.expr .vc-badge{background:#805ad5}
.vc-body{display:none;padding:13px 15px;border-top:1px solid #edf2f7;background:#f8fafc;font-size:13.5px;line-height:1.65}
.vc-body.open{display:block}
.vc-row{margin-bottom:6px}
.vc-row b{color:#555;margin-right:5px}
.vc-ites{color:#444;font-style:italic}
.vc-ko{color:#888;font-size:13px}

/* ── FLASHCARD ── */
.fc-ctrl{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.fc-sel{padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;cursor:pointer;color:#2d3748}
.fc-area{display:flex;flex-direction:column;align-items:center;gap:18px}
.fc-prog{font-size:14px;color:#718096}
.fc-scene{width:400px;height:230px;perspective:1000px;cursor:pointer;max-width:100%}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s}
.fc-card.flip{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:16px;padding:28px;box-shadow:0 8px 28px rgba(0,0,0,.13)}
.fc-front{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.fc-back{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;transform:rotateY(180deg)}
.fc-lang{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.fc-main{font-size:28px;font-weight:700;text-align:center;line-height:1.3}
.fc-sub{font-size:13px;opacity:.85;margin-top:8px;text-align:center;font-style:italic}
.fc-hint{font-size:13px;color:#a0aec0}
.fc-btns{display:flex;gap:14px}
.fc-btn{padding:11px 26px;border-radius:10px;border:none;font-size:15px;cursor:pointer;font-weight:700;transition:all .2s}
.fc-btn.know{background:#48bb78;color:#fff}.fc-btn.know:hover{background:#38a169}
.fc-btn.dunno{background:#fc8181;color:#fff}.fc-btn.dunno:hover{background:#e53e3e}
.fc-btn.restart{background:#667eea;color:#fff}.fc-btn.restart:hover{background:#5a67d8}
.fc-done{display:none;text-align:center;padding:36px;background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.1);width:100%;max-width:400px}
.fc-done h3{font-size:22px;margin-bottom:10px}
.fc-done p{color:#718096;margin-bottom:20px}

/* ── QUIZ ── */
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.quiz-top h2{font-size:20px}
.q-score{font-size:15px;color:#718096}
.q-box{background:#fff;padding:24px;border-radius:13px;box-shadow:0 2px 9px rgba(0,0,0,.08);margin-bottom:18px}
.q-num{font-size:12px;color:#a0aec0;margin-bottom:6px}
.q-dir{font-size:12px;color:#667eea;margin-bottom:10px;font-weight:600}
.q-text{font-size:19px;font-weight:700;color:#1a202c;margin-bottom:22px}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-opt{padding:13px 16px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;cursor:pointer;font-size:14px;text-align:left;transition:all .2s;color:#2d3748;line-height:1.4}
.q-opt:hover:not(:disabled){border-color:#667eea;background:#ebf4ff}
.q-opt.correct{border-color:#48bb78!important;background:#f0fff4!important;color:#276749!important;font-weight:600}
.q-opt.wrong{border-color:#fc8181!important;background:#fff5f5!important;color:#c53030!important}
.q-opt:disabled{cursor:default}
.q-fb{display:none;padding:11px 14px;border-radius:8px;margin-top:12px;font-size:14px}
.q-fb.show{display:block}
.q-fb.c{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
.q-fb.w{background:#fff5f5;color:#c53030;border:1px solid #fed7d7}
.q-next{display:none;margin-top:14px;padding:11px 24px;background:#667eea;color:#fff;border:none;border-radius:9px;font-size:15px;cursor:pointer;font-weight:700}
.q-next:hover{background:#5a67d8}
.q-next.show{display:block}
.q-summary{display:none;text-align:center;padding:40px;background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.1)}
.q-summary.show{display:block}
.qs-big{font-size:52px;font-weight:800;color:#667eea}
.qs-of{font-size:18px;color:#718096;margin-bottom:8px}
.qs-msg{font-size:15px;color:#444;margin-bottom:26px}
.qs-restart{padding:12px 32px;background:#667eea;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:700}
.qs-restart:hover{background:#5a67d8}

@media(max-width:580px){
  .q-opts{grid-template-columns:1fr}
  .fc-scene{width:95vw;height:200px}
  .fc-main{font-size:22px}
  .passage{padding:20px}
}

/* ── STRAWBERRY TIMER WIDGET ── */
#berry-widget{
  position:fixed;bottom:28px;right:28px;z-index:9999;
  user-select:none;touch-action:none;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.28));
  transition:filter .2s;
}
#berry-widget:hover{filter:drop-shadow(0 8px 22px rgba(0,0,0,.36));}
#berry-widget.dragging{cursor:grabbing;filter:drop-shadow(0 12px 28px rgba(0,0,0,.42));}

#berry-svg{display:block;}

#berry-overlay{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  align-items:center;
  justify-content:center;
  padding-top:30px; /* offset for leaves */
  pointer-events:none;
}
#berry-time{
  font-size:26px;font-weight:900;
  color:#fff;
  text-shadow:0 1px 5px rgba(0,0,0,.55);
  letter-spacing:1px;
  line-height:1;
}
#berry-mode-label{
  font-size:9px;font-weight:700;
  color:rgba(255,255,255,.9);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-top:3px;
}
#berry-controls{
  position:absolute;
  bottom:20px;left:0;right:0;
  display:flex;justify-content:center;gap:10px;
}
.berry-btn{
  width:30px;height:30px;border-radius:50%;border:none;
  background:rgba(255,255,255,.92);
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
  transition:transform .12s,background .15s;
  pointer-events:all;
}
.berry-btn:hover{transform:scale(1.15);background:#fff;}
.berry-btn:active{transform:scale(.95);}
#berry-mode-toggle{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  font-size:9px;padding:2px 8px;border-radius:10px;border:none;
  background:rgba(255,255,255,.75);color:#6d1a1a;
  cursor:pointer;font-weight:700;letter-spacing:.5px;
  pointer-events:all;
  transition:background .15s;
}
#berry-mode-toggle:hover{background:rgba(255,255,255,.95);}
#berry-collapse{
  position:absolute;top:-8px;right:-8px;
  width:22px;height:22px;border-radius:50%;border:none;
  background:#fff;color:#c62828;
  font-size:11px;font-weight:700;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.22);
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s;
  z-index:1;
}
#berry-collapse:hover{transform:scale(1.15);}
#berry-widget.collapsed #berry-overlay,
#berry-widget.collapsed #berry-controls,
#berry-widget.collapsed #berry-mode-toggle{opacity:.3;pointer-events:none;}
#berry-widget.collapsed #berry-svg{opacity:.6;}

/* pulse ring when running */
@keyframes berry-pulse{
  0%{r:62;opacity:.4;}
  100%{r:72;opacity:0;}
}
#berry-pulse-ring{display:none;}
#berry-widget.running #berry-pulse-ring{display:block;}

/* ── READING LAYOUT ── */
.reading-wrap{display:grid;grid-template-columns:1fr 310px;gap:20px;align-items:start}
@media(max-width:820px){.reading-wrap{grid-template-columns:1fr}}

/* ── NOTEPAD ── */
.notepad{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;position:sticky;top:20px}
.notepad-head{padding:13px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #e2e8f0;background:#f8fafc}
.notepad-title{font-weight:700;font-size:14px;color:#2d3748}
.notepad-clear{padding:4px 11px;border-radius:7px;border:none;background:#fed7d7;color:#c53030;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s}
.notepad-clear:hover{background:#fc8181;color:#fff}
#notepad-ta{width:100%;height:480px;border:none;padding:14px;font-size:14px;line-height:1.8;resize:none;color:#2d3748;font-family:inherit;outline:none;background:#fffffe}

/* ── TRANSLATION ── */
.trans-btn{margin-bottom:14px;padding:7px 16px;background:#ebf8ff;border:2px solid #63b3ed;border-radius:20px;color:#2b6cb0;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s}
.trans-btn.on{background:#bee3f8;border-color:#3182ce}
.kr-p{display:none;background:#fffbeb;border-left:3px solid #f6ad55;padding:10px 14px;margin:-10px 0 16px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.9;color:#744210}
.kr-p.show{display:block}
</style>
</head>
<body>

<div class="passage-bar">
  <span class="passage-bar-label">지문</span>
  <select id="passage-sel" onchange="loadPassage(this.value)"></select>
</div>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('reading',this)">📖 지문 읽기</button>
  <button class="tab-btn" onclick="switchTab('vocab',this)">📚 어휘 목록</button>
  <button class="tab-btn" onclick="switchTab('flash',this)">🃏 플래시카드</button>
  <button class="tab-btn" onclick="switchTab('quiz',this)">✏️ 퀴즈</button>
</nav>

<!-- READING -->
<div id="pane-reading" class="tab-pane active"></div>

<!-- VOCAB -->
<div id="pane-vocab" class="tab-pane">
  <div class="filter-row" id="filter-row"></div>
  <div class="vgrid" id="vgrid"></div>
</div>

<!-- FLASHCARD -->
<div id="pane-flash" class="tab-pane">
  <div class="fc-ctrl">
    <select class="fc-sel" id="fc-type" onchange="initFC()">
      <option value="all">전체 단어</option>
      <option value="noun">명사만</option>
      <option value="adj">형용사만</option>
      <option value="verb">동사만</option>
      <option value="expr">표현만</option>
    </select>
    <select class="fc-sel" id="fc-dir" onchange="initFC()">
      <option value="ek">스페인어 → 한국어</option>
      <option value="ke">한국어 → 스페인어</option>
    </select>
  </div>
  <div class="fc-area">
    <div class="fc-prog" id="fc-prog">0 / 0</div>
    <div class="fc-scene" id="fc-scene" onclick="flipFC()">
      <div class="fc-card" id="fc-card">
        <div class="fc-front">
          <div class="fc-lang" id="fc-fl">ES</div>
          <div class="fc-main" id="fc-fm">—</div>
          <div class="fc-sub" id="fc-fs"></div>
        </div>
        <div class="fc-back">
          <div class="fc-lang" id="fc-bl">KO</div>
          <div class="fc-main" id="fc-bm">—</div>
          <div class="fc-sub" id="fc-bs"></div>
        </div>
      </div>
    </div>
    <div class="fc-hint" id="fc-hint">카드를 클릭하면 뒤집힙니다</div>
    <div class="fc-btns" id="fc-btns">
      <button class="fc-btn know" onclick="fcAns(true)">✓ 알아요</button>
      <button class="fc-btn dunno" onclick="fcAns(false)">✗ 몰라요</button>
    </div>
    <div class="fc-done" id="fc-done">
      <h3>🎉 완료!</h3>
      <p id="fc-done-msg"></p>
      <button class="fc-btn restart" onclick="initFC()">다시 시작</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div id="pane-quiz" class="tab-pane">
  <div class="quiz-top">
    <h2>✏️ 스페인어 퀴즈</h2>
    <div class="q-score" id="q-score">0 / 10</div>
  </div>
  <div id="q-wrap"></div>
  <div class="q-summary" id="q-summary">
    <div class="qs-big" id="qs-n"></div>
    <div class="qs-of">/ 10 정답</div>
    <div class="qs-msg" id="qs-msg"></div>
    <button class="qs-restart" onclick="startQuiz()">다시 풀기</button>
  </div>
</div>

<!-- ── STRAWBERRY TIMER WIDGET ── -->
<div id="berry-widget">
  <button id="berry-collapse" title="접기/펼치기">–</button>
  <button id="berry-mode-toggle" onclick="berryNextMode()">🍅 집중</button>
  <svg id="berry-svg" viewBox="0 0 120 148" width="138" height="170">
    <!-- pulse ring (visible when running) -->
    <circle id="berry-pulse-ring" cx="60" cy="90" r="62" fill="none" stroke="rgba(255,100,100,.5)" stroke-width="3">
      <animate attributeName="r" from="60" to="74" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from=".5" to="0" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Calyx (leaves) -->
    <ellipse cx="60" cy="24" rx="11" ry="20" fill="#43a047" transform="rotate(-38 60 24)" opacity=".9"/>
    <ellipse cx="60" cy="24" rx="11" ry="20" fill="#66bb6a" transform="rotate(-15 60 24)"/>
    <ellipse cx="60" cy="24" rx="11" ry="20" fill="#43a047" transform="rotate(15 60 24)"/>
    <ellipse cx="60" cy="24" rx="11" ry="20" fill="#66bb6a" transform="rotate(38 60 24)" opacity=".9"/>
    <!-- Center nub -->
    <ellipse cx="60" cy="17" rx="5" ry="9" fill="#81c784"/>
    <!-- Strawberry body -->
    <path id="berry-body" d="M60,32 C38,32 17,44 15,66 C12,90 28,116 50,131 C54,134 57,136 60,136 C63,136 66,134 70,131 C92,116 108,90 105,66 C103,44 82,32 60,32 Z" fill="#e53935"/>
    <!-- Highlight -->
    <ellipse cx="40" cy="55" rx="9" ry="14" fill="rgba(255,255,255,.12)" transform="rotate(-20 40 55)"/>
    <!-- Seeds row 1 -->
    <ellipse cx="44" cy="57" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-12 44 57)"/>
    <ellipse cx="60" cy="54" rx="2.2" ry="3.2" fill="#b71c1c"/>
    <ellipse cx="76" cy="57" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(12 76 57)"/>
    <!-- Seeds row 2 -->
    <ellipse cx="37" cy="72" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-18 37 72)"/>
    <ellipse cx="52" cy="69" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-6 52 69)"/>
    <ellipse cx="68" cy="69" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(6 68 69)"/>
    <ellipse cx="83" cy="72" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(18 83 72)"/>
    <!-- Seeds row 3 -->
    <ellipse cx="34" cy="87" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-22 34 87)"/>
    <ellipse cx="49" cy="84" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-8 49 84)"/>
    <ellipse cx="60" cy="83" rx="2.2" ry="3.2" fill="#b71c1c"/>
    <ellipse cx="71" cy="84" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(8 71 84)"/>
    <ellipse cx="86" cy="87" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(22 86 87)"/>
    <!-- Seeds row 4 -->
    <ellipse cx="39" cy="101" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-16 39 101)"/>
    <ellipse cx="52" cy="99" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-5 52 99)"/>
    <ellipse cx="68" cy="99" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(5 68 99)"/>
    <ellipse cx="81" cy="101" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(16 81 101)"/>
    <!-- Seeds row 5 -->
    <ellipse cx="49" cy="114" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(-10 49 114)"/>
    <ellipse cx="60" cy="113" rx="2.2" ry="3.2" fill="#b71c1c"/>
    <ellipse cx="71" cy="114" rx="2.2" ry="3.2" fill="#b71c1c" transform="rotate(10 71 114)"/>
  </svg>
  <div id="berry-overlay">
    <div id="berry-time">25:00</div>
    <div id="berry-mode-label">집중</div>
  </div>
  <div id="berry-controls">
    <button class="berry-btn" id="berry-start-btn" onclick="berryToggle()" title="시작/일시정지">▶</button>
    <button class="berry-btn" onclick="berryReset()" title="초기화">↺</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PASSAGE REGISTRY
// ═══════════════════════════════════════════════════════════════
const PASSAGES = [PASSAGE_01, PASSAGE_02];
let currentPassage = PASSAGES[0];

const TL = {noun:'명사', adj:'형용사', verb:'동사', expr:'표현'};
const TB = {noun:'N', adj:'Adj', verb:'V', expr:'Expr'};

// ═══════════════════════════════════════════════════════════════
// AUTO-ANNOTATION ENGINE
// ═══════════════════════════════════════════════════════════════
function normW(s) {
  return s.toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
    .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
    .replace(/[úùü]/g,'u').replace(/ñ/g,'n');
}

function buildVocabLookup(vocab) {
  const map = new Map();

  function add(surface, item) {
    const k = normW(surface.toLowerCase().trim());
    if (k && !map.has(k)) map.set(k, item);
  }

  for (const v of vocab) {
    if (v.t === 'expr') continue;

    // Handle 'rico/a' format — use first variant as base
    const w = v.w.split('/')[0].toLowerCase().trim();
    add(w, v);

    if (v.t === 'noun') {
      if (w.endsWith('z')) {
        add(w.slice(0,-1) + 'ces', v);
      } else if (/[bcdfghjklmnñpqrstvwxyz]$/.test(w)) {
        add(w + 'es', v);
        add(w + 's', v);
      } else {
        add(w + 's', v);
      }
    }

    if (v.t === 'adj') {
      if (w.endsWith('o')) {
        add(w.slice(0,-1) + 'a', v);
        add(w + 's', v);
        add(w.slice(0,-1) + 'as', v);
      } else if (w.endsWith('or')) {
        add(w + 'a', v); add(w + 'es', v); add(w + 'as', v);
      } else {
        add(w + 'es', v);
        add(w + 's', v);
      }
    }

    if (v.t === 'verb') {
      const inf = w.endsWith('se') ? w.slice(0,-2) : w;
      const ending = inf.slice(-2);
      const stem = inf.slice(0,-2);
      add(inf, v);

      if (ending === 'ar') {
        ['o','as','a','amos','áis','an',
         'aba','abas','ábamos','abais','aban',
         'é','aste','ó','asteis','aron',
         'ando'].forEach(s => add(stem+s, v));
        add(stem+'ado', v); add(stem+'ada', v);
        add(stem+'ados', v); add(stem+'adas', v);
      } else if (ending === 'er') {
        ['o','es','e','emos','éis','en',
         'ía','ías','íamos','íais','ían',
         'í','iste','ió','imos','isteis','ieron',
         'iendo'].forEach(s => add(stem+s, v));
        add(stem+'ido', v); add(stem+'ida', v);
        add(stem+'idos', v); add(stem+'idas', v);
      } else if (ending === 'ir') {
        ['o','es','e','imos','ís','en',
         'ía','ías','íamos','íais','ían',
         'í','iste','ió','isteis','ieron',
         'iendo'].forEach(s => add(stem+s, v));
        add(stem+'ido', v); add(stem+'ida', v);
        add(stem+'idos', v); add(stem+'idas', v);
      }
    }
  }

  return map;
}

function makeTip(surface, v) {
  const safeEe = v.ee.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span class="vw" data-id="${v.id}">${surface}<span class="tip"><span class="tip-word">${v.w}</span><span class="tip-mean">${v.m}</span><span class="tip-ex">${safeEe}</span></span></span>`;
}

function annotateText(text, vocab) {
  const lookup = buildVocabLookup(vocab);
  const exprs = vocab.filter(v => v.t === 'expr')
    .sort((a,b) => b.w.split(' ').length - a.w.split(' ').length);

  const placeholders = [];
  let working = text;

  // First pass: replace multi-word expressions with placeholders
  for (const expr of exprs) {
    let pattern = expr.w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Convert escaped ... to a flex match
    pattern = pattern.replace(/\\\.\\\.\\\./g, '.+?');
    try {
      const re = new RegExp('(?<![a-záéíóúüñA-ZÁÉÍÓÚÜÑ])' + pattern + '(?![a-záéíóúüñA-ZÁÉÍÓÚÜÑ])', 'gi');
      working = working.replace(re, match => {
        const idx = placeholders.length;
        placeholders.push(makeTip(match, expr));
        return '\x00' + idx + '\x01';
      });
    } catch(e) {}
  }

  // HTML-escape the remaining text (placeholders survive unharmed)
  working = working.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Second pass: annotate individual words
  working = working.replace(/[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+/g, word => {
    // skip placeholder markers
    if (word === '') return word;
    const key = normW(word.toLowerCase());
    if (lookup.has(key)) return makeTip(word, lookup.get(key));
    return word;
  });

  // Restore expression placeholders
  working = working.replace(/\x00(\d+)\x01/g, (_, i) => placeholders[+i]);

  return working;
}

// ═══════════════════════════════════════════════════════════════
// PASSAGE LOADING
// ═══════════════════════════════════════════════════════════════
function initPassageSel() {
  document.getElementById('passage-sel').innerHTML = PASSAGES.map(p =>
    `<option value="${p.meta.id}">[${p.meta.level}] ${p.meta.title} · ${p.meta.topic}</option>`
  ).join('');
}

function loadPassage(id) {
  currentPassage = PASSAGES.find(p => p.meta.id === id) || PASSAGES[0];
  document.getElementById('passage-sel').value = currentPassage.meta.id;
  renderReading();
  updateFilterRow();
  renderVocab('all');
}

function renderReading() {
  const p = currentPassage;

  const paragraphs = p.paragraphs_es.map((es, i) => {
    const ko = p.paragraphs_ko[i] || '';
    const annotated = annotateText(es, p.vocab);
    return `<p>${annotated}</p><div class="kr-p">${ko}</div>`;
  }).join('\n');

  document.getElementById('pane-reading').innerHTML = `
    <button class="trans-btn" id="trans-btn" onclick="toggleTrans()">🇰🇷 한국어 해석 보기</button>
    <div class="reading-wrap">
      <div class="passage">
        <h2>${p.meta.title}</h2>
        ${paragraphs}
      </div>
      <div class="notepad">
        <div class="notepad-head">
          <span class="notepad-title">📝 메모장</span>
          <button class="notepad-clear" onclick="clearNotes()">전체 지우기</button>
        </div>
        <textarea id="notepad-ta" placeholder="여기에 메모를 작성하세요&#10;&#10;예) 외울 단어, 문장 분석, 궁금한 점..." oninput="saveNotes()"></textarea>
      </div>
    </div>`;

  const saved = localStorage.getItem('es-notes-' + p.meta.id);
  document.getElementById('notepad-ta').value = saved || '';
}

function updateFilterRow() {
  const V = currentPassage.vocab;
  const c = V.reduce((acc, v) => { acc[v.t] = (acc[v.t]||0)+1; return acc; }, {});
  document.getElementById('filter-row').innerHTML = `
    <button class="fbtn all on" onclick="filterV('all',this)">전체 ${V.length}</button>
    <button class="fbtn noun" onclick="filterV('noun',this)">명사 ${c.noun||0}</button>
    <button class="fbtn adj"  onclick="filterV('adj',this)">형용사 ${c.adj||0}</button>
    <button class="fbtn verb" onclick="filterV('verb',this)">동사 ${c.verb||0}</button>
    <button class="fbtn expr" onclick="filterV('expr',this)">표현 ${c.expr||0}</button>`;
}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

// ═══════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════
function switchTab(name, btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='vocab') { updateFilterRow(); renderVocab('all'); }
  if(name==='flash') initFC();
  if(name==='quiz')  startQuiz();
}

// ═══════════════════════════════════════════════════════════════
// READING — tooltip click toggle (mobile)
// ═══════════════════════════════════════════════════════════════
document.addEventListener('click', e=>{
  const vw = e.target.closest('.vw');
  if(vw){
    document.querySelectorAll('.vw.open').forEach(el=>{ if(el!==vw) el.classList.remove('open'); });
    vw.classList.toggle('open');
    e.stopPropagation();
  } else {
    document.querySelectorAll('.vw.open').forEach(el=>el.classList.remove('open'));
  }
});

// ═══════════════════════════════════════════════════════════════
// VOCAB TAB
// ═══════════════════════════════════════════════════════════════
function filterV(type, btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderVocab(type);
}

function renderVocab(type){
  const V = currentPassage.vocab;
  const list = type==='all' ? V : V.filter(v=>v.t===type);
  document.getElementById('vgrid').innerHTML = list.map(v=>`
    <div class="vc ${v.t}" onclick="toggleVC(this)">
      <div class="vc-head">
        <div><div class="vc-w">${v.w}</div><div class="vc-m">${v.m}</div></div>
        <span class="vc-badge">${TB[v.t]}</span>
      </div>
      <div class="vc-body">
        <div class="vc-row"><span class="vc-ites">${v.ee}</span></div>
        <div class="vc-row vc-ko">${v.ek}</div>
        ${v.ant && v.ant!=='-' && !v.ant.startsWith('(')?`<div class="vc-row"><b>반대말</b>${v.ant}</div>`:''}
        ${v.frm && v.frm!=='-'?`<div class="vc-row"><b>활용형</b>${v.frm}</div>`:''}
      </div>
    </div>`).join('');
}

function toggleVC(el){ el.querySelector('.vc-body').classList.toggle('open'); }

// ═══════════════════════════════════════════════════════════════
// FLASHCARD
// ═══════════════════════════════════════════════════════════════
let fcDeck=[], fcIdx=0, fcKnown=0, fcFlipped=false;

function initFC(){
  const V = currentPassage.vocab;
  const type=document.getElementById('fc-type').value;
  fcDeck = shuffle(type==='all'?[...V]:V.filter(v=>v.t===type));
  fcIdx=0; fcKnown=0; fcFlipped=false;
  document.getElementById('fc-done').style.display='none';
  document.getElementById('fc-btns').style.display='flex';
  document.getElementById('fc-scene').style.display='block';
  document.getElementById('fc-hint').style.display='block';
  document.getElementById('fc-prog').style.display='block';
  document.getElementById('fc-card').classList.remove('flip');
  showFC();
}

function showFC(){
  if(fcIdx>=fcDeck.length){
    document.getElementById('fc-scene').style.display='none';
    document.getElementById('fc-btns').style.display='none';
    document.getElementById('fc-hint').style.display='none';
    document.getElementById('fc-prog').style.display='none';
    document.getElementById('fc-done').style.display='block';
    document.getElementById('fc-done-msg').textContent=
      `총 ${fcDeck.length}장 중 ${fcKnown}장을 맞혔습니다!`;
    return;
  }
  const card=fcDeck[fcIdx];
  const ek=document.getElementById('fc-dir').value==='ek';
  document.getElementById('fc-fl').textContent=ek?'ES':'KO';
  document.getElementById('fc-fm').textContent=ek?card.w:card.m;
  document.getElementById('fc-fs').textContent=ek?TL[card.t]:'';
  document.getElementById('fc-bl').textContent=ek?'KO':'ES';
  document.getElementById('fc-bm').textContent=ek?card.m:card.w;
  document.getElementById('fc-bs').textContent=card.ee;
  document.getElementById('fc-prog').textContent=`${fcIdx+1} / ${fcDeck.length}`;
}

function flipFC(){
  fcFlipped=!fcFlipped;
  document.getElementById('fc-card').classList.toggle('flip',fcFlipped);
}

function fcAns(know){
  if(know){ fcKnown++; fcIdx++; }
  else { const c=fcDeck.splice(fcIdx,1)[0]; fcDeck.push(c); }
  fcFlipped=false;
  document.getElementById('fc-card').classList.remove('flip');
  showFC();
}

// ═══════════════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════════════
let qQs=[], qCur=0, qScore=0;

function startQuiz(){
  const V = currentPassage.vocab;
  qQs=shuffle([...V]).slice(0,10);
  qCur=0; qScore=0;
  document.getElementById('q-summary').classList.remove('show');
  document.getElementById('q-score').textContent='0 / 10';
  showQ();
}

function showQ(){
  const wrap=document.getElementById('q-wrap');
  if(qCur>=qQs.length){ wrap.innerHTML=''; showQSummary(); return; }
  const q=qQs[qCur];
  const ek=Math.random()>.5;
  const qText=ek?q.w:q.m;
  const correct=ek?q.m:q.w;
  const pool=shuffle(currentPassage.vocab.filter(v=>v.id!==q.id)).slice(0,3).map(v=>ek?v.m:v.w);
  const opts=shuffle([correct,...pool]);
  wrap.innerHTML=`
    <div class="q-box" data-correct="${correct.replace(/"/g,'&quot;')}">
      <div class="q-num">문제 ${qCur+1} / 10</div>
      <div class="q-dir">${ek?'스페인어 → 한국어':'한국어 → 스페인어'}</div>
      <div class="q-text">"${qText}"의 ${ek?'뜻은?':'스페인어는?'}</div>
      <div class="q-opts">
        ${opts.map(o=>`<button class="q-opt" data-val="${o.replace(/"/g,'&quot;')}" onclick="checkQ(this)">${o}</button>`).join('')}
      </div>
      <div class="q-fb" id="q-fb"></div>
      <button class="q-next" id="q-next" onclick="nextQ()">${qCur+1<10?'다음 문제 →':'결과 보기'}</button>
    </div>`;
}

function checkQ(btn){
  const box=btn.closest('.q-box');
  const correct=box.dataset.correct;
  const sel=btn.dataset.val;
  box.querySelectorAll('.q-opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===correct) b.classList.add('correct');
  });
  const fb=document.getElementById('q-fb');
  const nxt=document.getElementById('q-next');
  if(sel===correct){
    btn.classList.add('correct'); qScore++;
    fb.textContent='✓ 정답입니다!';
    fb.className='q-fb show c';
  } else {
    btn.classList.add('wrong');
    fb.textContent=`✗ 오답! 정답은 "${correct}"입니다.`;
    fb.className='q-fb show w';
  }
  document.getElementById('q-score').textContent=`${qScore} / 10`;
  nxt.classList.add('show');
}

function nextQ(){ qCur++; showQ(); }

function showQSummary(){
  document.getElementById('q-summary').classList.add('show');
  document.getElementById('qs-n').textContent=qScore;
  const msgs=['다시 도전해보세요! 💪','더 연습이 필요해요!','좋아요, 계속 노력하세요! 👍','잘하고 있어요! 🌟','거의 다 왔어요! 🔥','훌륭해요! 🎉','완벽합니다! 🏆'];
  document.getElementById('qs-msg').textContent=msgs[Math.min(qScore,6)];
}

// ═══════════════════════════════════════════════════════════════
// TRANSLATION TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleTrans(){
  const btn=document.getElementById('trans-btn');
  const isOn=btn.classList.toggle('on');
  document.querySelectorAll('.kr-p').forEach(el=>el.classList.toggle('show',isOn));
  btn.textContent=isOn?'🇰🇷 한국어 해석 숨기기':'🇰🇷 한국어 해석 보기';
}

// ═══════════════════════════════════════════════════════════════
// NOTEPAD
// ═══════════════════════════════════════════════════════════════
function saveNotes(){
  localStorage.setItem('es-notes-'+currentPassage.meta.id, document.getElementById('notepad-ta').value);
}
function clearNotes(){
  if(confirm('메모를 모두 지울까요?')){
    document.getElementById('notepad-ta').value='';
    localStorage.removeItem('es-notes-'+currentPassage.meta.id);
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initPassageSel();
loadPassage(PASSAGES[0].meta.id);

// ═══════════════════════════════════════════════════════════════
// STRAWBERRY TIMER WIDGET
// ═══════════════════════════════════════════════════════════════
(function(){
  const MODES = [
    {key:'focus', label:'집중', emoji:'🍅', secs:25*60, color:'#e53935'},
    {key:'short', label:'짧은 휴식', emoji:'☕', secs:5*60,  color:'#43a047'},
    {key:'long',  label:'긴 휴식',  emoji:'🌿', secs:15*60, color:'#1976d2'},
  ];
  let modeIdx = 0;
  let remaining = MODES[0].secs;
  let running = false;
  let timerId = null;

  const widget    = document.getElementById('berry-widget');
  const timeEl    = document.getElementById('berry-time');
  const labelEl   = document.getElementById('berry-mode-label');
  const startBtn  = document.getElementById('berry-start-btn');
  const modeToggle= document.getElementById('berry-mode-toggle');
  const collapseBtn = document.getElementById('berry-collapse');
  const body      = document.getElementById('berry-body');

  function fmt(s){
    const m = String(Math.floor(s/60)).padStart(2,'0');
    const sec = String(s%60).padStart(2,'0');
    return m+':'+sec;
  }

  function applyMode(){
    const m = MODES[modeIdx];
    remaining = m.secs;
    running = false;
    clearInterval(timerId);
    widget.classList.remove('running');
    startBtn.textContent = '▶';
    timeEl.textContent = fmt(remaining);
    labelEl.textContent = m.label;
    modeToggle.textContent = m.emoji + ' ' + m.label;
    body.setAttribute('fill', m.color);
    document.title = fmt(remaining) + ' — ' + m.label;
  }

  function tick(){
    if(remaining <= 0){
      clearInterval(timerId);
      running = false;
      widget.classList.remove('running');
      startBtn.textContent = '▶';
      timeEl.textContent = '00:00';
      document.title = '완료! — ' + MODES[modeIdx].label;
      if(Notification.permission === 'granted'){
        new Notification('🍓 타이머 완료!', {body: MODES[modeIdx].label + ' 완료!'});
      }
      // Auto-advance to next mode
      setTimeout(()=>{ modeIdx=(modeIdx+1)%MODES.length; applyMode(); }, 1500);
      return;
    }
    remaining--;
    timeEl.textContent = fmt(remaining);
    document.title = fmt(remaining) + ' — ' + MODES[modeIdx].label;
  }

  window.berryToggle = function(){
    if(running){
      clearInterval(timerId);
      running = false;
      widget.classList.remove('running');
      startBtn.textContent = '▶';
    } else {
      if(Notification.permission === 'default') Notification.requestPermission();
      running = true;
      widget.classList.add('running');
      startBtn.textContent = '⏸';
      timerId = setInterval(tick, 1000);
    }
  };

  window.berryReset = function(){
    clearInterval(timerId);
    running = false;
    widget.classList.remove('running');
    startBtn.textContent = '▶';
    remaining = MODES[modeIdx].secs;
    timeEl.textContent = fmt(remaining);
    document.title = fmt(remaining) + ' — ' + MODES[modeIdx].label;
  };

  window.berryNextMode = function(){
    modeIdx = (modeIdx + 1) % MODES.length;
    applyMode();
  };

  // Collapse toggle
  let collapsed = false;
  collapseBtn.addEventListener('click', ()=>{
    collapsed = !collapsed;
    widget.classList.toggle('collapsed', collapsed);
    collapseBtn.textContent = collapsed ? '+' : '–';
  });

  // ── Drag logic ──
  let dragStartX=0, dragStartY=0, widgetStartX=0, widgetStartY=0, isDragging=false;

  widget.addEventListener('mousedown', e=>{
    if(e.target.tagName === 'BUTTON') return;
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const rect = widget.getBoundingClientRect();
    widgetStartX = rect.left;
    widgetStartY = rect.top;
    widget.classList.add('dragging');
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    widget.style.left = widgetStartX + 'px';
    widget.style.top  = widgetStartY + 'px';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    const nx = widgetStartX + dx;
    const ny = widgetStartY + dy;
    const maxX = window.innerWidth  - widget.offsetWidth;
    const maxY = window.innerHeight - widget.offsetHeight;
    widget.style.left = Math.max(0, Math.min(nx, maxX)) + 'px';
    widget.style.top  = Math.max(0, Math.min(ny, maxY)) + 'px';
  });

  document.addEventListener('mouseup', ()=>{
    if(isDragging){ isDragging=false; widget.classList.remove('dragging'); }
  });

  // Touch drag
  widget.addEventListener('touchstart', e=>{
    if(e.target.tagName === 'BUTTON') return;
    const t = e.touches[0];
    isDragging = true;
    dragStartX = t.clientX;
    dragStartY = t.clientY;
    const rect = widget.getBoundingClientRect();
    widgetStartX = rect.left;
    widgetStartY = rect.top;
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    widget.style.left = widgetStartX + 'px';
    widget.style.top  = widgetStartY + 'px';
  }, {passive:true});

  document.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const t = e.touches[0];
    const dx = t.clientX - dragStartX;
    const dy = t.clientY - dragStartY;
    const nx = widgetStartX + dx;
    const ny = widgetStartY + dy;
    const maxX = window.innerWidth  - widget.offsetWidth;
    const maxY = window.innerHeight - widget.offsetHeight;
    widget.style.left = Math.max(0, Math.min(nx, maxX)) + 'px';
    widget.style.top  = Math.max(0, Math.min(ny, maxY)) + 'px';
  }, {passive:true});

  document.addEventListener('touchend', ()=>{ isDragging = false; });

  applyMode();
})();
</script>
</body>
</html>
